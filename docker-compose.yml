services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: codequest
      POSTGRES_USER: codequest
      POSTGRES_PASSWORD: codequest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codequest -d codequest"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge-runner:
    build:
      context: .
      dockerfile: judge_runner/Dockerfile
    restart: unless-stopped
    environment:
      JUDGE_RUNNER_HOST: 0.0.0.0
      JUDGE_RUNNER_PORT: "8090"
      JUDGE_RUNNER_MAX_CONCURRENCY: ${JUDGE_RUNNER_MAX_CONCURRENCY:-4}
    expose:
      - "8090"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-init:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      ENABLE_DEMO_DATA: ${ENABLE_DEMO_DATA:-false}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      CODE_JUDGE_RUNNER_URL: http://judge-runner:8090/execute
      CODE_JUDGE_ALLOW_LOCAL_FALLBACK: ${CODE_JUDGE_ALLOW_LOCAL_FALLBACK:-false}
      METRICS_DEBUG: ${METRICS_DEBUG:-0}
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "flask", "--app", "run.py", "bootstrap-app"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      ENABLE_DEMO_DATA: ${ENABLE_DEMO_DATA:-false}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      CODE_JUDGE_RUNNER_URL: http://judge-runner:8090/execute
      CODE_JUDGE_ALLOW_LOCAL_FALLBACK: ${CODE_JUDGE_ALLOW_LOCAL_FALLBACK:-false}
      METRICS_DEBUG: ${METRICS_DEBUG:-0}
    depends_on:
      db:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
      judge-runner:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        APP_ENV: ${APP_ENV:-development}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        INTERNAL_API_URL: http://backend:8000/api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
