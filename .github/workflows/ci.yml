name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile backend sources
        run: python -m compileall backend
      - name: Run backend regression tests
        run: python -m unittest discover -s backend/tests -v

  frontend-build:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      INTERNAL_API_URL: http://localhost:8000/api
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Build and start services
        run: docker compose up -d --build db judge-runner backend-init backend frontend
      - name: Wait for backend health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health > /tmp/backend-health.json; then
              cat /tmp/backend-health.json
              exit 0
            fi
            sleep 5
          done
          echo "Backend health check did not pass in time" >&2
          docker compose logs backend
          exit 1
      - name: Wait for judge runner health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8090/health > /tmp/judge-health.json; then
              cat /tmp/judge-health.json
              exit 0
            fi
            sleep 5
          done
          echo "Judge runner health check did not pass in time" >&2
          docker compose logs judge-runner
          exit 1
      - name: Wait for frontend
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:3000/auth/login > /tmp/frontend-health.html; then
              head -n 5 /tmp/frontend-health.html
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not become reachable in time" >&2
          docker compose logs frontend
          exit 1
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop services
        if: always()
        run: docker compose down -v
